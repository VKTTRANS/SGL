<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGL Master List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f4f7fe;
            color: #2b3674;
            margin: 0;
            padding: 20px;
        }
        .container-fluid {
            max-width: 1500px;
        }
        .header-title {
            font-weight: 700;
            color: #2b3674;
            font-size: 28px;
            letter-spacing: -0.5px;
        }
        .btn-primary-gradient {
            background: linear-gradient(135deg, #4318FF 0%, #868CFF 100%);
            border: none;
            color: white;
            border-radius: 12px;
            padding: 10px 24px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(67, 24, 255, 0.2);
        }
        .btn-primary-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(67, 24, 255, 0.3);
            color: white;
        }
        .card-custom {
            background: #ffffff;
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            padding: 24px;
            margin-top: 20px;
        }
        .search-container {
            position: relative;
            width: 100%;
            max-width: 350px;
        }
        .search-container i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #a3bed1;
        }
        .form-control-search {
            background: #f4f7fe;
            border: none;
            border-radius: 30px;
            padding: 10px 20px 10px 45px;
            font-size: 14px;
            width: 100%;
            transition: all 0.3s ease;
        }
        .form-control-search:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(67, 24, 255, 0.1);
            background: #ffffff;
        }
        .table {
            margin-top: 10px;
        }
        .table thead th {
            border-bottom: 1px solid #e9edf7;
            color: #a3aed1;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 16px;
            cursor: pointer;
            transition: color 0.2s;
            white-space: nowrap;
        }
        .table thead th:hover {
            color: #4318FF;
        }
        .table tbody td {
            border-bottom: 1px solid #f4f7fe;
            padding: 16px;
            vertical-align: middle;
            font-size: 14px;
            color: #2b3674;
            font-weight: 500;
        }
        .table-hover tbody tr {
            transition: all 0.2s ease;
        }
        .table-hover tbody tr:hover {
            background-color: #f8f9fc;
            transform: scale(1.002);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border-radius: 12px;
        }
        .amount-text {
            color: #05cd99;
            font-weight: 700;
        }
        .timestamp-text {
            color: #8f9bba;
            font-size: 13px;
            font-weight: 400;
        }
        .action-btn {
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
        }
        .btn-print { background: #111c43; color: white; }
        .btn-edit { background: #ffce20; color: #111c43; }
        .btn-delete { background: #ee5d50; color: white; }
        .action-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .modal-content {
            border-radius: 24px;
            border: none;
        }
        .modal-header {
            background: linear-gradient(135deg, #4318FF 0%, #868CFF 100%);
            color: white;
            border-radius: 24px 24px 0 0;
            border-bottom: none;
            padding: 24px;
        }
        .modal-body {
            padding: 32px;
        }
        .form-label {
            font-weight: 600;
            color: #2b3674;
            font-size: 14px;
        }
        .form-control, .form-select {
            border-radius: 12px;
            border: 1px solid #e9edf7;
            padding: 10px 16px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #4318FF;
            box-shadow: 0 0 0 3px rgba(67, 24, 255, 0.1);
        }
        .th-sort-icon {
            margin-left: 6px;
            font-size: 12px;
            color: #c7d2e9;
        }
        .loader-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f4f7fe;
            border-top: 4px solid #4318FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .d-none { display: none !important; }
        
        /* Pagination Styling */
        .page-link {
            color: #2b3674;
            border: none;
            margin: 0 3px;
            border-radius: 8px !important;
            font-weight: 600;
            background: #f4f7fe;
        }
        .page-link:hover {
            background: #e9edf7;
            color: #4318FF;
        }
        .page-item.active .page-link {
            background: linear-gradient(135deg, #4318FF 0%, #868CFF 100%);
            color: white;
            box-shadow: 0 4px 10px rgba(67, 24, 255, 0.2);
        }
        .page-item.disabled .page-link {
            color: #a3bed1;
            background: transparent;
        }
    </style>
</head>
<body>

<div id="mainLoader" class="loader-wrapper">
    <div class="spinner"></div>
    <div class="mt-3 fw-bold text-primary">กำลังโหลดข้อมูล...</div>
</div>

<div class="container-fluid py-3">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-2">
        <div class="d-flex align-items-center gap-3">
            <div style="background: linear-gradient(135deg, #4318FF, #868CFF); padding: 12px; border-radius: 14px;">
                <i class="fa-solid fa-file-invoice-dollar text-white fs-4"></i>
            </div>
            <h2 class="header-title m-0">SGL Master List</h2>
        </div>
        <button class="btn-primary-gradient mt-3 mt-md-0" onclick="openAddModal()">
            <i class="fa-solid fa-plus me-2"></i>เพิ่มรายการใหม่
        </button>
    </div>

    <div class="card-custom">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
            <div class="d-flex align-items-center gap-2">
                <span style="font-size: 14px; font-weight: 500;">แสดง</span>
                <select id="pageSize" class="form-select form-select-sm" style="width: 85px;">
                    <option value="30">30</option>
                    <option value="50" selected>50</option>
                    <option value="100">100</option>
                    <option value="all">ทั้งหมด</option>
                </select>
                <span style="font-size: 14px; font-weight: 500;">รายการ</span>
            </div>
            
            <div class="search-container">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" class="form-control-search" placeholder="ค้นหาข้อมูลใดๆ ในตาราง...">
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th onclick="sortTable('timestamp')">วันที่สร้าง <i class="fa-solid fa-sort th-sort-icon" id="sort-timestamp"></i></th>
                        <th onclick="sortTable('bookingNo')">Booking No. <i class="fa-solid fa-sort th-sort-icon" id="sort-bookingNo"></i></th>
                        <th onclick="sortTable('invoiceNo')">Invoice / Receipt <i class="fa-solid fa-sort th-sort-icon" id="sort-invoiceNo"></i></th>
                        <th onclick="sortTable('amount')">ยอดเงิน (THB) <i class="fa-solid fa-sort th-sort-icon" id="sort-amount"></i></th>
                        <th onclick="sortTable('billDate')">วันที่ออกบิล <i class="fa-solid fa-sort th-sort-icon" id="sort-billDate"></i></th>
                        <th onclick="sortTable('submitDate')">วันที่ส่งเอกสาร <i class="fa-solid fa-sort th-sort-icon" id="sort-submitDate"></i></th>
                        <th onclick="sortTable('details')">หมายเหตุ / รายละเอียด <i class="fa-solid fa-sort th-sort-icon" id="sort-details"></i></th>
                        <th class="text-center" style="width: 180px; min-width: 150px;">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="dataTable">
                </tbody>
            </table>
        </div>
        
        <div class="d-flex flex-wrap justify-content-between align-items-center mt-4">
            <div class="text-muted" style="font-size: 14px; font-weight: 500;">
                พบ <span id="recordCount" class="text-primary fw-bold">0</span> รายการ
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0" id="paginationControls">
                </ul>
            </nav>
        </div>
    </div>
</div>

<div class="modal fade" id="dataModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="modalTitle">ฟอร์มข้อมูลเอกสาร</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="dataForm">
                    <input type="hidden" id="actionType" value="add">
                    <input type="hidden" id="editRow" value="">
                    
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">เลขที่ Booking</label>
                            <input type="text" id="bookingNo" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">เลขที่ Invoice / Receipt</label>
                            <input type="text" id="invoiceNo" class="form-control" required>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">จำนวนยอดเงิน (บาท)</label>
                            <input type="number" step="0.01" id="amount" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">วันที่ออกบิล</label>
                            <input type="date" id="billDate" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">วันที่ส่งเอกสาร</label>
                            <input type="date" id="submitDate" class="form-control">
                        </div>

                        <div class="col-12">
                            <label class="form-label">รายละเอียดเพิ่มเติม / หมายเหตุ</label>
                            <textarea id="details" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                    
                    <div class="text-end mt-5">
                        <button type="button" class="btn btn-light px-4 me-2 border" style="border-radius: 12px; font-weight: 600;" data-bs-dismiss="modal">ยกเลิก</button>
                        <button type="submit" id="saveButton" class="btn-primary-gradient px-5">บันทึกข้อมูล</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="loadingModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content text-center p-4" style="background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);">
            <div class="spinner mx-auto mb-3"></div>
            <div class="fw-bold" style="color: #2b3674; font-size: 16px;">กำลังประมวลผล PDF...</div>
            <div class="text-muted small mt-1">กรุณารอสักครู่</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbynbOaqhL6JfelhsCRrP1glBS5d834u8Mq8eoIPdJe31rZextKEEFc3-jWdEcKUmN6IGA/exec';
    
    let allData = [];
    let filteredData = [];
    let currentSortCol = '';
    let sortAsc = true;
    let currentPage = 1;
    let pageSize = 50;

    const dataModal = new bootstrap.Modal(document.getElementById('dataModal'));
    const loadingModal = new bootstrap.Modal(document.getElementById('loadingModal'));

    async function loadData() {
        document.getElementById('mainLoader').classList.remove('d-none');
        try {
            const response = await fetch(`${SCRIPT_URL}?action=getData`);
            allData = await response.json();
            applyFilters();
        } catch (error) {
            document.getElementById('dataTable').innerHTML = '<tr><td colspan="8" class="text-center text-danger py-4">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</td></tr>';
        }
        document.getElementById('mainLoader').classList.add('d-none');
    }

    function applyFilters() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        
        filteredData = allData.filter(item => {
            return (
                String(item.timestamp).toLowerCase().includes(keyword) ||
                String(item.bookingNo).toLowerCase().includes(keyword) ||
                String(item.invoiceNo).toLowerCase().includes(keyword) ||
                String(item.amount).toLowerCase().includes(keyword) ||
                String(item.billDate).toLowerCase().includes(keyword) ||
                String(item.submitDate).toLowerCase().includes(keyword) ||
                String(item.details).toLowerCase().includes(keyword)
            );
        });

        if (currentSortCol) {
            filteredData.sort((a, b) => {
                let valA = a[currentSortCol] || '';
                let valB = b[currentSortCol] || '';
                if (currentSortCol === 'amount') return sortAsc ? valA - valB : valB - valA;
                if (['billDate', 'submitDate', 'timestamp'].includes(currentSortCol)) {
                    let dateA = new Date(valA).getTime() || 0;
                    let dateB = new Date(valB).getTime() || 0;
                    return sortAsc ? dateA - dateB : dateB - dateA;
                }
                return sortAsc ? String(valA).localeCompare(String(valB), 'th') : String(valB).localeCompare(String(valA), 'th');
            });
        }
        
        currentPage = 1;
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('dataTable');
        tbody.innerHTML = '';
        document.getElementById('recordCount').innerText = filteredData.length;

        if (filteredData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-5 text-muted"><i class="fa-solid fa-folder-open fs-1 mb-3 d-block"></i>ไม่พบข้อมูล</td></tr>';
            renderPagination(0);
            return;
        }

        let dataToRender = filteredData;
        if (pageSize !== 'all') {
            const start = (currentPage - 1) * pageSize;
            dataToRender = filteredData.slice(start, start + pageSize);
        }

        dataToRender.forEach(item => {
            const itemData = JSON.stringify(item).replace(/'/g, "&#39;");
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="timestamp-text">${item.timestamp}</td>
                <td class="fw-bold">${item.bookingNo}</td>
                <td class="fw-bold">${item.invoiceNo}</td>
                <td class="amount-text">${Number(item.amount).toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                <td>${item.billDate}</td>
                <td>${item.submitDate}</td>
                <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.details}</td>
                <td class="text-center text-nowrap">
                    <button class="action-btn btn-print me-1" onclick='printDoc("${item.invoiceNo}")'><i class="fa-solid fa-print"></i></button>
                    <button class="action-btn btn-edit me-1" onclick='openEditModal(${itemData})'><i class="fa-solid fa-pen"></i></button>
                    <button class="action-btn btn-delete" onclick='deleteRow(${item.row})'><i class="fa-solid fa-trash"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
        
        renderPagination(filteredData.length);
    }

    function renderPagination(totalItems) {
        const ul = document.getElementById('paginationControls');
        ul.innerHTML = '';
        if (pageSize === 'all' || totalItems <= pageSize) return;

        const totalPages = Math.ceil(totalItems / pageSize);

        ul.innerHTML += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(event, ${currentPage - 1})">«</a></li>`;
        for(let i = 1; i <= totalPages; i++) {
            ul.innerHTML += `<li class="page-item ${currentPage === i ? 'active' : ''}"><a class="page-link" href="#" onclick="changePage(event, ${i})">${i}</a></li>`;
        }
        ul.innerHTML += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(event, ${currentPage + 1})">»</a></li>`;
    }

    function changePage(e, page) {
        e.preventDefault();
        const totalPages = Math.ceil(filteredData.length / pageSize);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderTable();
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    
    document.getElementById('pageSize').addEventListener('change', function(e) {
        pageSize = e.target.value === 'all' ? 'all' : parseInt(e.target.value);
        currentPage = 1;
        renderTable();
    });

    function sortTable(column) {
        if (currentSortCol === column) {
            sortAsc = !sortAsc;
        } else {
            sortAsc = true;
            currentSortCol = column;
        }
        document.querySelectorAll('.th-sort-icon').forEach(icon => icon.className = 'fa-solid fa-sort th-sort-icon');
        const activeIcon = document.getElementById(`sort-${column}`);
        if (activeIcon) activeIcon.className = sortAsc ? 'fa-solid fa-sort-up th-sort-icon text-primary' : 'fa-solid fa-sort-down th-sort-icon text-primary';
        applyFilters();
    }

    function openAddModal() {
        document.getElementById('dataForm').reset();
        document.getElementById('actionType').value = 'add';
        document.getElementById('modalTitle').innerText = 'เพิ่มรายการเอกสารใหม่';
        dataModal.show();
    }

    function openEditModal(item) {
        document.getElementById('actionType').value = 'edit';
        document.getElementById('editRow').value = item.row;
        document.getElementById('bookingNo').value = item.bookingNo;
        document.getElementById('invoiceNo').value = item.invoiceNo;
        document.getElementById('amount').value = item.amount;
        document.getElementById('billDate').value = item.billDate;
        document.getElementById('submitDate').value = (item.submitDate && item.submitDate !== '-') ? item.submitDate : '';
        document.getElementById('details').value = item.details === '-' ? '' : item.details;
        document.getElementById('modalTitle').innerText = 'แก้ไขข้อมูลเอกสาร';
        dataModal.show();
    }

    document.getElementById('dataForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const saveBtn = document.getElementById('saveButton');
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>กำลังบันทึก...';
        
        const payload = {
            action: document.getElementById('actionType').value,
            row: document.getElementById('editRow').value,
            bookingNo: document.getElementById('bookingNo').value,
            invoiceNo: document.getElementById('invoiceNo').value,
            amount: parseFloat(document.getElementById('amount').value),
            billDate: document.getElementById('billDate').value,
            submitDate: document.getElementById('submitDate').value,
            details: document.getElementById('details').value
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            dataModal.hide();
            await loadData();
        } catch (error) {
            alert('บันทึกข้อมูลไม่สำเร็จ');
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerText = 'บันทึกข้อมูล';
        }
    });

    async function printDoc(invoiceNo) {
        loadingModal.show();
        try {
            const response = await fetch(`${SCRIPT_URL}?action=print&invoice=${invoiceNo}`);
            const result = await response.json();
            loadingModal.hide();
            
            if (result.error) {
                alert('แจ้งเตือน: ' + result.error);
                return;
            }
            
            if (result.base64) {
                const byteCharacters = atob(result.base64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], {type: 'application/pdf'});
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = result.filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        } catch (error) {
            loadingModal.hide();
            alert('ระบบขัดข้อง: ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์เพื่อพิมพ์ PDF ได้');
        }
    }

    async function deleteRow(rowNum) {
        if(confirm('ยืนยันการลบข้อมูลรายการนี้?')) {
            document.getElementById('mainLoader').classList.remove('d-none');
            try {
                await fetch(`${SCRIPT_URL}?action=delete&row=${rowNum}`);
                await loadData();
            } catch (error) {
                alert('ลบข้อมูลไม่สำเร็จ');
                document.getElementById('mainLoader').classList.add('d-none');
            }
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
