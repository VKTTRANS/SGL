<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGL Master List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f4f7fe;
            color: #2b3674;
            margin: 0;
            padding: 20px;
        }
        .container-fluid {
            max-width: 1500px;
        }
        .header-title {
            font-weight: 700;
            color: #2b3674;
            font-size: 28px;
            letter-spacing: -0.5px;
        }
        .btn-primary-gradient {
            background: linear-gradient(135deg, #4318FF 0%, #868CFF 100%);
            border: none;
            color: white;
            border-radius: 12px;
            padding: 10px 24px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(67, 24, 255, 0.2);
        }
        .btn-primary-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(67, 24, 255, 0.3);
            color: white;
        }
        .card-custom {
            background: #ffffff;
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            padding: 24px;
            margin-top: 20px;
        }
        .search-container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }
        .search-container i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #a3bed1;
        }
        .form-control-search {
            background: #f4f7fe;
            border: none;
            border-radius: 30px;
            padding: 12px 20px 12px 45px;
            font-size: 15px;
            width: 100%;
            transition: all 0.3s ease;
        }
        .form-control-search:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(67, 24, 255, 0.1);
            background: #ffffff;
        }
        .table {
            margin-top: 10px;
        }
        .table thead th {
            border-bottom: 1px solid #e9edf7;
            color: #a3aed1;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 16px;
            cursor: pointer;
            transition: color 0.2s;
            white-space: nowrap;
        }
        .table thead th:hover {
            color: #4318FF;
        }
        .table tbody td {
            border-bottom: 1px solid #f4f7fe;
            padding: 16px;
            vertical-align: middle;
            font-size: 14px;
            color: #2b3674;
            font-weight: 500;
        }
        .table-hover tbody tr {
            transition: all 0.2s ease;
        }
        .table-hover tbody tr:hover {
            background-color: #f8f9fc;
            transform: scale(1.002);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border-radius: 12px;
        }
        .amount-text {
            color: #05cd99;
            font-weight: 700;
        }
        .timestamp-text {
            color: #8f9bba;
            font-size: 13px;
            font-weight: 400;
        }
        .action-btn {
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
        }
        .btn-print { background: #111c43; color: white; }
        .btn-edit { background: #ffce20; color: #111c43; }
        .btn-delete { background: #ee5d50; color: white; }
        .action-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .modal-content {
            border-radius: 24px;
            border: none;
        }
        .modal-header {
            background: linear-gradient(135deg, #4318FF 0%, #868CFF 100%);
            color: white;
            border-radius: 24px 24px 0 0;
            border-bottom: none;
            padding: 24px;
        }
        .modal-body {
            padding: 32px;
        }
        .form-label {
            font-weight: 600;
            color: #2b3674;
            font-size: 14px;
        }
        .form-control {
            border-radius: 12px;
            border: 1px solid #e9edf7;
            padding: 12px 16px;
        }
        .form-control:focus {
            border-color: #4318FF;
            box-shadow: 0 0 0 3px rgba(67, 24, 255, 0.1);
        }
        .th-sort-icon {
            margin-left: 6px;
            font-size: 12px;
            color: #c7d2e9;
        }
        .loader-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f4f7fe;
            border-top: 4px solid #4318FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .d-none { display: none !important; }
    </style>
</head>
<body>

<div id="mainLoader" class="loader-wrapper">
    <div class="spinner"></div>
    <div class="mt-3 fw-bold text-primary">กำลังโหลดข้อมูล...</div>
</div>

<div class="container-fluid py-3">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-2">
        <div class="d-flex align-items-center gap-3">
            <div style="background: linear-gradient(135deg, #4318FF, #868CFF); padding: 12px; border-radius: 14px;">
                <i class="fa-solid fa-file-invoice-dollar text-white fs-4"></i>
            </div>
            <h2 class="header-title m-0">SGL Master List</h2>
        </div>
        <button class="btn-primary-gradient mt-3 mt-md-0" onclick="openAddModal()">
            <i class="fa-solid fa-plus me-2"></i>เพิ่มรายการใหม่
        </button>
    </div>

    <div class="card-custom">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="search-container">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" class="form-control-search" placeholder="ค้นหาข้อมูลใดๆ ในตาราง...">
            </div>
            <div class="text-muted" style="font-size: 14px; font-weight: 500;">
                พบ <span id="recordCount" class="text-primary fw-bold">0</span> รายการ
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th onclick="sortTable('timestamp')">วันที่สร้าง <i class="fa-solid fa-sort th-sort-icon" id="sort-timestamp"></i></th>
                        <th onclick="sortTable('bookingNo')">Booking No. <i class="fa-solid fa-sort th-sort-icon" id="sort-bookingNo"></i></th>
                        <th onclick="sortTable('invoiceNo')">Invoice / Receipt <i class="fa-solid fa-sort th-sort-icon" id="sort-invoiceNo"></i></th>
                        <th onclick="sortTable('amount')">ยอดเงิน (THB) <i class="fa-solid fa-sort th-sort-icon" id="sort-amount"></i></th>
                        <th onclick="sortTable('billDate')">วันที่ออกบิล <i class="fa-solid fa-sort th-sort-icon" id="sort-billDate"></i></th>
                        <th onclick="sortTable('submitDate')">วันที่ส่งเอกสาร <i class="fa-solid fa-sort th-sort-icon" id="sort-submitDate"></i></th>
                        <th onclick="sortTable('details')">หมายเหตุ / รายละเอียด <i class="fa-solid fa-sort th-sort-icon" id="sort-details"></i></th>
                        <th class="text-center" style="width: 150px;">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="dataTable">
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="dataModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="modalTitle">ฟอร์มข้อมูลเอกสาร</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="dataForm">
                    <input type="hidden" id="actionType" value="add">
                    <input type="hidden" id="editRow" value="">
                    
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">เลขที่ Booking</label>
                            <input type="text" id="bookingNo" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">เลขที่ Invoice / Receipt</label>
                            <input type="text" id="invoiceNo" class="form-control" required>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">จำนวนยอดเงิน (บาท)</label>
                            <input type="number" step="0.01" id="amount" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">วันที่ออกบิล</label>
                            <input type="date" id="billDate" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">วันที่ส่งเอกสาร</label>
                            <input type="date" id="submitDate" class="form-control">
                        </div>

                        <div class="col-12">
                            <label class="form-label">รายละเอียดเพิ่มเติม / หมายเหตุ</label>
                            <textarea id="details" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                    
                    <div class="text-end mt-5">
                        <button type="button" class="btn btn-light px-4 me-2 border" style="border-radius: 12px; font-weight: 600;" data-bs-dismiss="modal">ยกเลิก</button>
                        <button type="submit" id="saveButton" class="btn-primary-gradient px-5">บันทึกข้อมูล</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="loadingModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content text-center p-4" style="background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);">
            <div class="spinner mx-auto mb-3"></div>
            <div class="fw-bold" style="color: #2b3674; font-size: 16px;">กำลังประมวลผล PDF...</div>
            <div class="text-muted small mt-1">กรุณารอสักครู่</div>
        </div>
    </div>
</div>

<script src="
