<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGL Billing Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .table-hover tbody tr:hover { background-color: #f1f1f1; cursor: pointer; }
    </style>
</head>
<body>

<div class="container-fluid py-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="m-0 fw-bold text-primary">📄 SGL Master List (Data)</h2>
        <button class="btn btn-primary" onclick="openAddModal()">+ เพิ่มรายการใหม่</button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-3">Booking No.</th>
                            <th>Invoice / Receipt</th>
                            <th>ยอดเงิน (THB)</th>
                            <th>วันที่ออกบิล</th>
                            <th>วันที่ส่งเอกสาร</th>
                            <th>รายละเอียด</th>
                            <th class="text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable">
                        <tr><td colspan="7" class="text-center py-4">กำลังโหลดข้อมูล...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="dataModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="modalTitle">ฟอร์มข้อมูลเอกสาร</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="dataForm">
            <input type="hidden" id="actionType" value="add">
            <input type="hidden" id="editRow" value="">
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">3.1 เลขที่ Booking</label>
                    <input type="text" id="bookingNo" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">3.2 เลขที่ Invoice / Receipt</label>
                    <input type="text" id="invoiceNo" class="form-control" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">3.3 จำนวนยอด (บาท)</label>
                    <input type="number" step="0.01" id="amount" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">3.4 วันที่ออกบิล</label>
                    <input type="date" id="billDate" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">3.5 วันที่ส่งเอกสาร</label>
                    <input type="date" id="submitDate" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">3.6 รายละเอียดเพิ่มเติม</label>
                <textarea id="details" class="form-control" rows="2"></textarea>
            </div>
            
            <div class="text-end mt-4">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
                <button type="submit" class="btn btn-success px-4">บันทึกข้อมูล</button>
            </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // URL ของ Web App ที่ให้มา
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbynbOaqhL6JfelhsCRrP1glBS5d834u8Mq8eoIPdJe31rZextKEEFc3-jWdEcKUmN6IGA/exec';
    
    // เก็บตัวแปร Modal
    const dataModal = new bootstrap.Modal(document.getElementById('dataModal'));
    
    // โหลดข้อมูล
    async function loadData() {
        try {
            const response = await fetch(`${SCRIPT_URL}?action=getData`);
            const data = await response.json();
            
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4">ไม่มีข้อมูล</td></tr>';
                return;
            }
            
            data.forEach(item => {
                // เก็บข้อมูลแบบ JSON ลงใน attribute เพื่อใช้อ้างอิงตอนแก้ไข
                const itemData = JSON.stringify(item).replace(/'/g, "&#39;");
                
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="ps-3 fw-bold">${item.bookingNo}</td>
                    <td>${item.invoiceNo}</td>
                    <td class="text-success fw-bold">${Number(item.amount).toLocaleString('th-TH', {minimumFractionDigits: 2})}</td>
                    <td>${item.billDate}</td>
                    <td>${item.submitDate || '-'}</td>
                    <td>${item.details || '-'}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-dark me-1" onclick='printDoc("${item.invoiceNo}")'>Print</button>
                        <button class="btn btn-sm btn-warning me-1" onclick='openEditModal(${itemData})'>แก้ไข</button>
                        <button class="btn btn-sm btn-danger" onclick='deleteRow(${item.row})'>ลบ</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            document.getElementById('dataTable').innerHTML = '<tr><td colspan="7" class="text-center text-danger py-4">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>';
        }
    }

    // เปิด Modal แบบ "เพิ่มข้อมูล"
    function openAddModal() {
        document.getElementById('dataForm').reset();
        document.getElementById('actionType').value = 'add';
        document.getElementById('modalTitle').innerText = 'เพิ่มข้อมูลเอกสาร';
        dataModal.show();
    }

    // เปิด Modal แบบ "แก้ไขข้อมูล"
    function openEditModal(item) {
        document.getElementById('actionType').value = 'edit';
        document.getElementById('editRow').value = item.row;
        
        document.getElementById('bookingNo').value = item.bookingNo;
        document.getElementById('invoiceNo').value = item.invoiceNo;
        document.getElementById('amount').value = item.amount;
        document.getElementById('billDate').value = item.billDate;
        document.getElementById('submitDate').value = item.submitDate;
        document.getElementById('details').value = item.details;
        
        document.getElementById('modalTitle').innerText = 'แก้ไขข้อมูล (Row: ' + item.row + ')';
        dataModal.show();
    }

    // สั่งบันทึกข้อมูล (รับรองทั้ง Add และ Edit)
    document.getElementById('dataForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.innerText = 'กำลังบันทึก...';
        
        const payload = {
            action: document.getElementById('actionType').value,
            row: document.getElementById('editRow').value,
            bookingNo: document.getElementById('bookingNo').value,
            invoiceNo: document.getElementById('invoiceNo').value,
            amount: parseFloat(document.getElementById('amount').value),
            billDate: document.getElementById('billDate').value,
            submitDate: document.getElementById('submitDate').value,
            details: document.getElementById('details').value
        };

        try {
            // ส่งข้อมูลเป็น text/plain เพื่อเลี่ยงปัญหา CORS
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            
            dataModal.hide();
            await loadData();
        } catch (error) {
            alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'บันทึกข้อมูล';
        }
    });

    // ฟังก์ชันสั่ง Print
    async function printDoc(invoiceNo) {
        alert('กำลังสร้างไฟล์ PDF... กรุณารอสักครู่');
        try {
            const response = await fetch(`${SCRIPT_URL}?action=print&invoice=${invoiceNo}`);
            const result = await response.json();
            
            if(result.url) {
                // เด้งเปิดหน้า PDF
                window.open(result.url, '_blank');
            } else {
                alert('เกิดข้อผิดพลาด: ' + result.error);
            }
        } catch (error) {
            alert('ไม่สามารถสร้างเอกสารได้');
        }
    }

    // ฟังก์ชันลบข้อมูล
    async function deleteRow(rowNum) {
        if(confirm('คุณต้องการลบข้อมูลบรรทัดนี้ใช่หรือไม่?')) {
            try {
                await fetch(`${SCRIPT_URL}?action=delete&row=${rowNum}`);
                await loadData();
            } catch (error) {
                alert('ลบข้อมูลไม่สำเร็จ');
            }
        }
    }

    // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
    loadData();
</script>
</body>
</html>
