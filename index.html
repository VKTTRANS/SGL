<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGL Master List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f4f7fe; color: #2b3674; margin: 0; padding: 20px; }
        .container-fluid { max-width: 95%; }
        .header-title { font-weight: 700; color: #2b3674; font-size: 28px; letter-spacing: -0.5px; }
        .btn-primary-gradient { background: linear-gradient(135deg, #4318FF 0%, #868CFF 100%); border: none; color: white; border-radius: 12px; padding: 10px 24px; font-weight: 500; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(67, 24, 255, 0.2); }
        .btn-primary-gradient:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(67, 24, 255, 0.3); color: white; }
        .card-custom { background: #ffffff; border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); padding: 24px; margin-top: 20px; }
        .search-container { position: relative; width: 100%; max-width: 350px; }
        .search-container svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #a3bed1; }
        .form-control-search { background: #f4f7fe; border: none; border-radius: 30px; padding: 10px 20px 10px 45px; font-size: 14px; width: 100%; transition: all 0.3s ease; }
        .form-control-search:focus { outline: none; box-shadow: 0 0 0 3px rgba(67, 24, 255, 0.1); background: #ffffff; }
        .table { margin-top: 10px; }
        .table thead th { border-bottom: 1px solid #e9edf7; color: #a3aed1; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 16px; cursor: pointer; transition: color 0.2s; white-space: nowrap; }
        .table thead th:hover { color: #4318FF; }
        .table tbody td { border-bottom: 1px solid #f4f7fe; padding: 16px; vertical-align: middle; font-size: 14px; color: #2b3674; font-weight: 500; }
        .table-hover tbody tr { transition: all 0.2s ease; }
        .table-hover tbody tr:hover { background-color: #f8f9fc; transform: scale(1.002); box-shadow: 0 4px 10px rgba(0,0,0,0.02); border-radius: 12px; }
        .amount-text { color: #05cd99; font-weight: 700; }
        .timestamp-text { color: #8f9bba; font-size: 13px; font-weight: 400; }
        .action-btn { border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 600; border: none; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .btn-print { background: #111c43; color: white; }
        .btn-edit { background: #ffce20; color: #111c43; }
        .btn-delete { background: #ee5d50; color: white; }
        .action-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .modal-content { border-radius: 24px; border: none; }
        .modal-header { background: linear-gradient(135deg, #4318FF 0%, #868CFF 100%); color: white; border-radius: 24px 24px 0 0; border-bottom: none; padding: 24px; }
        .modal-body { padding: 32px; }
        .form-label { font-weight: 600; color: #2b3674; font-size: 14px; }
        .form-control, .form-select { border-radius: 12px; border: 1px solid #e9edf7; padding: 10px 16px; }
        .form-control:focus, .form-select:focus { border-color: #4318FF; box-shadow: 0 0 0 3px rgba(67, 24, 255, 0.1); }
        .th-sort-icon { margin-left: 6px; font-size: 12px; color: #c7d2e9; }
        .page-link { color: #2b3674; border: none; margin: 0 3px; border-radius: 8px !important; font-weight: 600; background: #f4f7fe; }
        .page-link:hover { background: #e9edf7; color: #4318FF; }
        .page-item.active .page-link { background: linear-gradient(135deg, #4318FF 0%, #868CFF 100%); color: white; box-shadow: 0 4px 10px rgba(67, 24, 255, 0.2); }
        .page-item.disabled .page-link { color: #a3bed1; background: transparent; }
    </style>
</head>
<body>

<div class="container-fluid py-3">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-2">
        <div class="d-flex align-items-center gap-3">
            <div style="background: linear-gradient(135deg, #4318FF, #868CFF); padding: 12px; border-radius: 14px;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
            </div>
            <h2 class="header-title m-0">SGL Master List</h2>
        </div>
        <button class="btn-primary-gradient mt-3 mt-md-0" onclick="openAddModal()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px; margin-bottom: 2px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            เพิ่มรายการใหม่
        </button>
    </div>

    <div class="card-custom">
        <div class="d-flex justify-content-end mb-4">
            <div class="search-container">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" class="form-control-search" placeholder="ค้นหาข้อมูลใดๆ ในตาราง...">
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th onclick="sortTable('timestamp')">วันที่สร้าง <span class="th-sort-icon" id="sort-timestamp">▼</span></th>
                        <th onclick="sortTable('bookingNo')">Booking No. <span class="th-sort-icon" id="sort-bookingNo">▼</span></th>
                        <th onclick="sortTable('invoiceNo')">Invoice / Receipt <span class="th-sort-icon" id="sort-invoiceNo">▼</span></th>
                        <th onclick="sortTable('amount')">ยอดเงิน (THB) <span class="th-sort-icon" id="sort-amount">▼</span></th>
                        <th onclick="sortTable('billDate')">วันที่ออกบิล <span class="th-sort-icon" id="sort-billDate">▼</span></th>
                        <th onclick="sortTable('submitDate')">วันที่ส่งเอกสาร <span class="th-sort-icon" id="sort-submitDate">▼</span></th>
                        <th onclick="sortTable('details')">หมายเหตุ / รายละเอียด <span class="th-sort-icon" id="sort-details">▼</span></th>
                        <th class="text-center" style="width: 180px; min-width: 150px;">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="dataTable">
                </tbody>
            </table>
        </div>
        
        <div class="d-flex flex-wrap justify-content-between align-items-center mt-4">
            <div class="d-flex align-items-center gap-3">
                <div class="text-muted" style="font-size: 14px; font-weight: 500;">
                    พบ <span id="recordCount" class="text-primary fw-bold">0</span> รายการ
                </div>
                <div class="d-flex align-items-center gap-2 border-start ps-3">
                    <span style="font-size: 14px; font-weight: 500;">แสดง</span>
                    <select id="pageSize" class="form-select form-select-sm" style="width: 85px;">
                        <option value="30">30</option>
                        <option value="50" selected>50</option>
                        <option value="100">100</option>
                        <option value="all">ทั้งหมด</option>
                    </select>
                    <span style="font-size: 14px; font-weight: 500;">รายการ</span>
                </div>
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0" id="paginationControls">
                </ul>
            </nav>
        </div>
    </div>
</div>

<div class="modal fade" id="dataModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="modalTitle">ฟอร์มข้อมูลเอกสาร</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="dataForm">
                    <input type="hidden" id="actionType" value="add">
                    <input type="hidden" id="editRow" value="">
                    
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">เลขที่ Booking</label>
                            <input type="text" id="bookingNo" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">เลขที่ Invoice / Receipt</label>
                            <input type="text" id="invoiceNo" class="form-control" required>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">จำนวนยอดเงิน (บาท)</label>
                            <input type="number" step="0.01" id="amount" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">วันที่ออกบิล</label>
                            <input type="date" id="billDate" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">วันที่ส่งเอกสาร</label>
                            <input type="date" id="submitDate" class="form-control">
                        </div>

                        <div class="col-12">
                            <label class="form-label">รายละเอียดเพิ่มเติม / หมายเหตุ</label>
                            <textarea id="details" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                    
                    <div class="text-end mt-5">
                        <button type="button" class="btn btn-light px-4 me-2 border" style="border-radius: 12px; font-weight: 600;" data-bs-dismiss="modal">ยกเลิก</button>
                        <button type="submit" class="btn-primary-gradient px-5">บันทึกข้อมูล</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbynbOaqhL6JfelhsCRrP1glBS5d834u8Mq8eoIPdJe31rZextKEEFc3-jWdEcKUmN6IGA/exec';
    
    let allData = [];
    let filteredData = [];
    let currentSortCol = '';
    let sortAsc = true;
    let currentPage = 1;
    let pageSize = 50;
    let userIP = "Unknown"; 

    const dataModal = new bootstrap.Modal(document.getElementById('dataModal'));

    // ตั้ง Timeout ให้ดึง IP ข้ามไปถ้าโหลดนานเกิน 3 วินาที ป้องกันหน้าเว็บค้าง
    async function fetchUserIP() {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000);
            const response = await fetch('https://api.ipify.org?format=json', { signal: controller.signal });
            const data = await response.json();
            userIP = data.ip;
            clearTimeout(timeoutId);
        } catch (error) {
            userIP = "Unknown";
        }
    }

    async function loadData() {
        Swal.fire({
            title: 'กำลังโหลดข้อมูล...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });
        
        try {
            const response = await fetch(`${SCRIPT_URL}?action=getData`);
            allData = await response.json();
            applyFilters();
            Swal.close();
        } catch (error) {
            Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้' });
        }
    }

    function applyFilters() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        filteredData = allData.filter(item => {
            return (
                String(item.timestamp).toLowerCase().includes(keyword) ||
                String(item.bookingNo).toLowerCase().includes(keyword) ||
                String(item.invoiceNo).toLowerCase().includes(keyword) ||
                String(item.amount).toLowerCase().includes(keyword) ||
                String(item.billDate).toLowerCase().includes(keyword) ||
                String(item.submitDate).toLowerCase().includes(keyword) ||
                String(item.details).toLowerCase().includes(keyword)
            );
        });

        if (currentSortCol) {
            filteredData.sort((a, b) => {
                let valA = a[currentSortCol] || '';
                let valB = b[currentSortCol] || '';
                if (currentSortCol === 'amount') return sortAsc ? valA - valB : valB - valA;
                if (['billDate', 'submitDate', 'timestamp'].includes(currentSortCol)) {
                    let dateA = new Date(valA).getTime() || 0;
                    let dateB = new Date(valB).getTime() || 0;
                    return sortAsc ? dateA - dateB : dateB - dateA;
                }
                return sortAsc ? String(valA).localeCompare(String(valB), 'th') : String(valB).localeCompare(String(valA), 'th');
            });
        }
        currentPage = 1;
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('dataTable');
        tbody.innerHTML = '';
        document.getElementById('recordCount').innerText = filteredData.length;

        if (filteredData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-5 text-muted"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-3 d-block mx-auto"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>ไม่พบข้อมูล</td></tr>';
            renderPagination(0);
            return;
        }

        let dataToRender = filteredData;
        if (pageSize !== 'all') {
            const start = (currentPage - 1) * pageSize;
            dataToRender = filteredData.slice(start, start + pageSize);
        }

        dataToRender.forEach(item => {
            const itemData = JSON.stringify(item).replace(/'/g, "&#39;");
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="timestamp-text">${item.timestamp}</td>
                <td class="fw-bold">${item.bookingNo}</td>
                <td class="fw-bold">${item.invoiceNo}</td>
                <td class="amount-text">${Number(item.amount).toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                <td>${item.billDate}</td>
                <td>${item.submitDate}</td>
                <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.details}</td>
                <td class="text-center text-nowrap">
                    <button class="action-btn btn-print me-1" onclick='printDoc("${item.invoiceNo}")'>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                    </button>
                    <button class="action-btn btn-edit me-1" onclick='openEditModal(${itemData})'>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="16 3 21 8 8 21 3 21 3 16 16 3"></polygon></svg>
                    </button>
                    <button class="action-btn btn-delete" onclick='deleteRow(${item.row}, "${item.invoiceNo}")'>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });
        renderPagination(filteredData.length);
    }

    function renderPagination(totalItems) {
        const ul = document.getElementById('paginationControls');
        ul.innerHTML = '';
        if (pageSize === 'all' || totalItems <= pageSize) return;

        const totalPages = Math.ceil(totalItems / pageSize);

        ul.innerHTML += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(event, ${currentPage - 1})">«</a></li>`;
        for(let i = 1; i <= totalPages; i++) {
            ul.innerHTML += `<li class="page-item ${currentPage === i ? 'active' : ''}"><a class="page-link" href="#" onclick="changePage(event, ${i})">${i}</a></li>`;
        }
        ul.innerHTML += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(event, ${currentPage + 1})">»</a></li>`;
    }

    function changePage(e, page) {
        e.preventDefault();
        const totalPages = Math.ceil(filteredData.length / pageSize);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderTable();
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    
    document.getElementById('pageSize').addEventListener('change', function(e) {
        pageSize = e.target.value === 'all' ? 'all' : parseInt(e.target.value);
        currentPage = 1;
        renderTable();
    });

    function sortTable(column) {
        if (currentSortCol === column) {
            sortAsc = !sortAsc;
        } else {
            sortAsc = true;
            currentSortCol = column;
        }
        document.querySelectorAll('.th-sort-icon').forEach(icon => icon.innerText = '▼');
        const activeIcon = document.getElementById(`sort-${column}`);
        if (activeIcon) activeIcon.innerText = sortAsc ? '▲' : '▼';
        applyFilters();
    }

    function openAddModal() {
        document.getElementById('dataForm').reset();
        document.getElementById('actionType').value = 'add';
        document.getElementById('modalTitle').innerText = 'เพิ่มรายการเอกสารใหม่';
        dataModal.show();
    }

    function openEditModal(item) {
        document.getElementById('actionType').value = 'edit';
        document.getElementById('editRow').value = item.row;
        document.getElementById('bookingNo').value = item.bookingNo;
        document.getElementById('invoiceNo').value = item.invoiceNo;
        document.getElementById('amount').value = item.amount;
        document.getElementById('billDate').value = item.billDate;
        document.getElementById('submitDate').value = (item.submitDate && item.submitDate !== '-') ? item.submitDate : '';
        document.getElementById('details').value = item.details === '-' ? '' : item.details;
        document.getElementById('modalTitle').innerText = 'แก้ไขข้อมูลเอกสาร';
        dataModal.show();
    }

    document.getElementById('dataForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const { value: pin } = await Swal.fire({
            title: 'ยืนยันตัวตน',
            text: 'กรุณากรอกรหัสผ่านเพื่อบันทึกข้อมูล',
            input: 'password',
            inputPlaceholder: 'ใส่รหัสผ่าน 4 หลัก',
            showCancelButton: true,
            confirmButtonColor: '#4318FF',
            confirmButtonText: 'บันทึก',
            cancelButtonText: 'ยกเลิก',
            inputValidator: (value) => {
                if (!value) return 'คุณยังไม่ได้กรอกรหัสผ่าน!';
            }
        });

        if (!pin) return; 

        Swal.fire({
            title: 'กำลังบันทึกข้อมูล...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });
        
        const payload = {
            action: document.getElementById('actionType').value,
            row: document.getElementById('editRow').value,
            bookingNo: document.getElementById('bookingNo').value,
            invoiceNo: document.getElementById('invoiceNo').value,
            amount: parseFloat(document.getElementById('amount').value),
            billDate: document.getElementById('billDate').value,
            submitDate: document.getElementById('submitDate').value,
            details: document.getElementById('details').value,
            ip: userIP,
            pin: pin 
        };

        try {
            const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await response.json();
            
            if(result.error) {
                Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: result.error });
            } else {
                dataModal.hide();
                Swal.fire({ icon: 'success', title: 'สำเร็จ', text: 'บันทึกข้อมูลเรียบร้อยแล้ว', timer: 1500, showConfirmButton: false });
                await loadData();
            }
        } catch (error) {
            Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้' });
        }
    });

    async function printDoc(invoiceNo) {
        Swal.fire({
            title: 'กำลังประมวลผล PDF...',
            text: 'ระบบกำลังสร้างไฟล์ อาจใช้เวลาสักครู่',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        try {
            const response = await fetch(`${SCRIPT_URL}?action=print&invoice=${invoiceNo}&ip=${encodeURIComponent(userIP)}`);
            const result = await response.json();
            
            if (result.error) {
                Swal.fire({ icon: 'error', title: 'แจ้งเตือน', text: result.error });
                return;
            }
            
            if (result.url) {
                Swal.close();
                const link = document.createElement('a');
                link.href = result.url;
                link.setAttribute('download', ''); 
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        } catch (error) {
            Swal.fire({ icon: 'error', title: 'ระบบขัดข้อง', text: 'ไม่สามารถดาวน์โหลดไฟล์ PDF ได้' });
        }
    }

    function deleteRow(rowNum, invoiceNo) {
        Swal.fire({
            title: 'ยืนยันการลบ?',
            text: "กรุณากรอกรหัสผ่านเพื่อยืนยันการลบข้อมูลนี้!",
            input: 'password',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ee5d50',
            cancelButtonColor: '#a3bed1',
            confirmButtonText: 'ใช่, ลบเลย!',
            cancelButtonText: 'ยกเลิก',
            inputValidator: (value) => {
                if (!value) return 'คุณยังไม่ได้กรอกรหัสผ่าน!';
            }
        }).then(async (result) => {
            if (result.isConfirmed) {
                const pin = result.value;
                
                Swal.fire({
                    title: 'กำลังลบข้อมูล...',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });
                
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=delete&row=${rowNum}&invoice=${invoiceNo}&ip=${encodeURIComponent(userIP)}&pin=${pin}`);
                    const resData = await response.json();
                    
                    if (resData.error) {
                        Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: resData.error });
                    } else {
                        Swal.fire({ icon: 'success', title: 'ลบสำเร็จ', showConfirmButton: false, timer: 1500 });
                        await loadData();
                    }
                } catch (error) {
                    Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้' });
                }
            }
        });
    }

    window.onload = async () => {
        await fetchUserIP();
        loadData();
    };
</script>
</body>
</html>
